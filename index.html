<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pomodoro</title>
<style>
  :root {
    --bg: #0a0b0f;
    --fg: #e7e9ee;
    --muted: #9aa0b0;
    --accent: #ff6b6b;        /* focus */
    --accent-break: #4ecdc4;  /* break */
    --accent-long: #6c8cff;   /* long break */
    --panel: rgba(28, 30, 38, 0.55);
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; margin: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ------------------------------------------------------------------ *
   *  Animated scene backdrop (pure CSS/SVG, no external assets)
   * ------------------------------------------------------------------ */
  .scene-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    background: #0a0b0f;
  }
  .scene {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.1s ease;
  }
  .scene.active { opacity: 1; }

  /* Dimming scrim + vignette so the timer stays readable (subtle backdrop) */
  .scrim {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 42%, rgba(10,11,15,0.35) 0%, rgba(10,11,15,0.62) 55%, rgba(10,11,15,0.82) 100%);
  }

  /* ---- Ocean ---- */
  .ocean { background: linear-gradient(180deg, #071726 0%, #0b2336 28%, #123a52 52%, #15596b 100%); }
  .ocean .glow {
    position: absolute; top: 14%; left: 50%; width: 150px; height: 150px;
    margin-left: -75px; border-radius: 50%;
    background: radial-gradient(circle, #fdf6e3 0%, #f3e6c4 38%, rgba(243,230,196,0) 70%);
    filter: blur(3px); opacity: 0.75;
  }
  .ocean .sea {
    position: absolute; left: 0; right: 0; bottom: 0; height: 46%;
    background: linear-gradient(180deg, #16596b 0%, #0a3144 100%);
    overflow: hidden;
  }
  .wave {
    position: absolute; left: 0; top: -10px; width: 200%; height: 70px;
    background-repeat: repeat-x; background-position: 0 bottom; background-size: 50% 100%;
    will-change: transform;
  }
  .wave.w1 {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 70'><path d='M0 35 C150 5 350 5 600 35 S1050 65 1200 35 V70 H0 Z' fill='%231a647a'/></svg>");
    opacity: 0.7; animation: drift 13s linear infinite;
  }
  .wave.w2 {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 70'><path d='M0 40 C200 10 400 70 600 40 S1000 10 1200 40 V70 H0 Z' fill='%23124456'/></svg>");
    top: 8px; opacity: 0.8; animation: drift 19s linear infinite reverse;
  }
  .wave.w3 {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 70'><path d='M0 45 C150 25 350 65 600 45 S1050 25 1200 45 V70 H0 Z' fill='%230c3144'/></svg>");
    top: 22px; opacity: 0.9; animation: drift 27s linear infinite;
  }
  .ocean .reflection {
    position: absolute; left: 50%; top: 30%; width: 70px; height: 60%;
    margin-left: -35px;
    background: linear-gradient(180deg, rgba(253,246,227,0.22), rgba(253,246,227,0));
    filter: blur(6px); animation: shimmer 6s ease-in-out infinite;
  }
  @keyframes drift { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes shimmer { 0%,100% { opacity: 0.5; transform: scaleX(1); } 50% { opacity: 0.85; transform: scaleX(1.25); } }

  /* ---- Forest ---- */
  .forest { background: linear-gradient(180deg, #0a1f1b 0%, #102a23 40%, #16352b 100%); }
  .forest .glow {
    position: absolute; top: 16%; left: 64%; width: 130px; height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(216,231,196,0.6) 0%, rgba(216,231,196,0) 68%);
    filter: blur(4px);
  }
  .mist {
    position: absolute; left: -25%; width: 150%; height: 120px; border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(180,210,190,0.16) 0%, rgba(180,210,190,0) 70%);
    filter: blur(8px); will-change: transform;
  }
  .mist.m1 { top: 52%; animation: floatx 26s ease-in-out infinite; }
  .mist.m2 { top: 66%; height: 150px; animation: floatx 38s ease-in-out infinite reverse; }
  .trees { position: absolute; left: 0; bottom: 0; width: 100%; height: auto; }
  .trees.far  { opacity: 0.55; transform: translateY(6%); }
  .trees.mid  { opacity: 0.8;  animation: sway 12s ease-in-out infinite; transform-origin: 50% 100%; }
  .trees.near { opacity: 1;    animation: sway 16s ease-in-out infinite reverse; transform-origin: 50% 100%; }
  @keyframes floatx { 0%,100% { transform: translateX(-4%); } 50% { transform: translateX(4%); } }
  @keyframes sway   { 0%,100% { transform: rotate(-0.5deg); } 50% { transform: rotate(0.5deg); } }

  /* ---- Mountains ---- */
  .mountains { background: linear-gradient(180deg, #0a0f24 0%, #16204a 45%, #2a3a63 100%); }
  .mountains .stars {
    position: absolute; inset: 0; height: 60%;
    background-image:
      radial-gradient(1.2px 1.2px at 12% 22%, #fff, transparent),
      radial-gradient(1px 1px at 28% 12%, #fff, transparent),
      radial-gradient(1.4px 1.4px at 41% 30%, #fff, transparent),
      radial-gradient(1px 1px at 57% 16%, #fff, transparent),
      radial-gradient(1.2px 1.2px at 68% 26%, #fff, transparent),
      radial-gradient(1px 1px at 79% 10%, #fff, transparent),
      radial-gradient(1.3px 1.3px at 88% 33%, #fff, transparent),
      radial-gradient(1px 1px at 35% 40%, #fff, transparent),
      radial-gradient(1px 1px at 6% 38%, #fff, transparent);
    animation: twinkle 5s ease-in-out infinite;
  }
  .mountains .glow {
    position: absolute; top: 12%; left: 22%; width: 110px; height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle, #fdf6e3 0%, #e9ddc0 42%, rgba(233,221,192,0) 70%);
    filter: blur(2px); opacity: 0.85;
  }
  .cloud {
    position: absolute; height: 60px; width: 280px; border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(190,200,225,0.22) 0%, rgba(190,200,225,0) 70%);
    filter: blur(6px); will-change: transform;
  }
  .cloud.c1 { top: 24%; left: 0;   animation: floatcloud 55s linear infinite; }
  .cloud.c2 { top: 36%; left: 0;   width: 200px; opacity: 0.7; animation: floatcloud 80s linear infinite; animation-delay: -20s; }
  .range { position: absolute; left: 0; bottom: 0; width: 100%; height: auto; }
  .range.far  { opacity: 0.5; }
  .range.mid  { opacity: 0.75; }
  .range.near { opacity: 1; }
  @keyframes twinkle    { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  @keyframes floatcloud { from { transform: translateX(-30%); } to { transform: translateX(130%); } }

  @media (prefers-reduced-motion: reduce) {
    .wave, .mist, .trees, .cloud, .reflection, .stars { animation: none !important; }
  }

  /* ------------------------------------------------------------------ *
   *  Timer UI (sits above the scene)
   * ------------------------------------------------------------------ */
  .app {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 460px;
    padding: 32px 24px;
    text-align: center;
  }

  .mode {
    font-size: 0.95rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--mode-color, var(--accent));
    transition: color 0.6s ease;
    margin-bottom: 8px;
    text-shadow: 0 1px 12px rgba(0,0,0,0.5);
  }

  .time {
    font-size: clamp(4.5rem, 22vw, 8rem);
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin: 4px 0 8px;
    color: var(--fg);
    text-shadow: 0 2px 24px rgba(0,0,0,0.55);
  }

  .sessions {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 32px;
    text-shadow: 0 1px 10px rgba(0,0,0,0.5);
  }
  .sessions b { color: var(--fg); font-weight: 600; }

  .controls { display: flex; gap: 12px; justify-content: center; }

  button {
    appearance: none;
    border: 1px solid rgba(255,255,255,0.14);
    background: var(--panel);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: var(--fg);
    font-size: 0.95rem;
    font-weight: 500;
    padding: 12px 22px;
    border-radius: 10px;
    cursor: pointer;
    transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.05s ease;
    min-width: 96px;
  }
  button:hover { background: rgba(40,44,56,0.7); border-color: rgba(255,255,255,0.26); }
  button:active { transform: translateY(1px); }
  button.primary {
    background: var(--mode-color, var(--accent));
    border-color: transparent;
    color: #0a0b0f;
    font-weight: 600;
  }
  button.primary:hover { filter: brightness(1.08); }

  .hint {
    margin-top: 24px;
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.02em;
    text-shadow: 0 1px 8px rgba(0,0,0,0.5);
  }
  .hint kbd {
    background: rgba(28,30,38,0.6);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: inherit;
    font-size: 0.75rem;
  }

  /* Scene picker */
  .scenes {
    margin-top: 20px;
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .scene-btn {
    min-width: 0;
    padding: 7px 15px;
    font-size: 0.74rem;
    letter-spacing: 0.04em;
    border-radius: 20px;
    color: var(--muted);
  }
  .scene-btn[aria-pressed="true"] {
    color: var(--fg);
    border-color: var(--mode-color, var(--accent));
    background: rgba(40,44,56,0.75);
  }

  /* Screen flash fallback when audio is blocked */
  .flash {
    position: fixed; inset: 0; background: #fff; opacity: 0;
    pointer-events: none; z-index: 20;
  }
  .flash.active { animation: flash 0.55s ease; }
  @keyframes flash { 0% { opacity: 0; } 15% { opacity: 0.85; } 100% { opacity: 0; } }
</style>
</head>
<body data-mode="focus">

  <!-- Animated backdrop -->
  <div class="scene-bg" aria-hidden="true">
    <div class="scene ocean active" id="scene-ocean">
      <div class="glow"></div>
      <div class="sea">
        <div class="wave w1"></div>
        <div class="wave w2"></div>
        <div class="wave w3"></div>
        <div class="reflection"></div>
      </div>
    </div>

    <div class="scene forest" id="scene-forest">
      <div class="glow"></div>
      <div class="mist m1"></div>
      <div class="mist m2"></div>
      <svg class="trees far" viewBox="0 0 1200 300" preserveAspectRatio="none">
        <path fill="#0c241c" d="M0,300 L0,215 L60,150 L120,205 L180,140 L240,205 L300,160 L360,200 L420,145 L480,205 L540,155 L600,205 L660,140 L720,205 L780,160 L840,200 L900,150 L960,205 L1020,155 L1080,205 L1140,160 L1200,205 L1200,300 Z"/>
      </svg>
      <svg class="trees mid" viewBox="0 0 1200 300" preserveAspectRatio="none">
        <path fill="#08251b" d="M0,300 L0,235 L55,120 L110,210 L170,95 L230,215 L290,130 L350,205 L410,105 L470,210 L535,120 L600,215 L660,100 L720,210 L780,130 L840,205 L905,110 L965,210 L1025,120 L1085,210 L1145,130 L1200,215 L1200,300 Z"/>
      </svg>
      <svg class="trees near" viewBox="0 0 1200 300" preserveAspectRatio="none">
        <path fill="#04140e" d="M0,300 L0,250 L50,150 L100,235 L160,120 L220,240 L280,160 L350,230 L410,135 L470,240 L540,150 L600,238 L665,125 L725,238 L790,160 L850,230 L915,140 L975,240 L1035,150 L1095,238 L1150,160 L1200,235 L1200,300 Z"/>
      </svg>
    </div>

    <div class="scene mountains" id="scene-mountains">
      <div class="stars"></div>
      <div class="glow"></div>
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <svg class="range far" viewBox="0 0 1200 300" preserveAspectRatio="none">
        <path fill="#1c2a52" d="M0,300 L0,200 L200,95 L380,200 L560,120 L760,50 L980,190 L1180,110 L1200,150 L1200,300 Z"/>
      </svg>
      <svg class="range mid" viewBox="0 0 1200 300" preserveAspectRatio="none">
        <path fill="#141d3d" d="M0,300 L0,235 L160,150 L340,250 L520,160 L720,235 L900,140 L1080,240 L1200,180 L1200,300 Z"/>
      </svg>
      <svg class="range near" viewBox="0 0 1200 300" preserveAspectRatio="none">
        <path fill="#090e22" d="M0,300 L0,270 L180,205 L360,285 L540,215 L760,285 L960,210 L1160,285 L1200,255 L1200,300 Z"/>
      </svg>
    </div>
  </div>

  <div class="scrim" aria-hidden="true"></div>
  <div class="flash" id="flash" aria-hidden="true"></div>

  <main class="app">
    <div class="mode" id="modeLabel">Focus</div>
    <div class="time" id="time">25:00</div>
    <div class="sessions">Completed focus sessions: <b id="count">0</b></div>

    <div class="controls">
      <button class="primary" id="startBtn">Start</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="scenes" role="group" aria-label="Background scene">
      <button class="scene-btn" data-scene="ocean"     aria-pressed="true">Ocean</button>
      <button class="scene-btn" data-scene="forest"    aria-pressed="false">Forest</button>
      <button class="scene-btn" data-scene="mountains" aria-pressed="false">Mountains</button>
    </div>

    <div class="hint">
      <kbd>Space</kbd> start / pause &nbsp;·&nbsp; <kbd>R</kbd> reset &nbsp;·&nbsp; <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> scene
    </div>
  </main>

<script>
"use strict";

/* ------------------------------------------------------------------ *
 *  Pure logic
 *  These functions hold no state of their own. They take a state
 *  object (and inputs) and return new values, which makes the timing
 *  and mode-transition rules easy to reason about and test.
 * ------------------------------------------------------------------ */

var DURATIONS = {
  focus:     25 * 60,
  break:      5 * 60,
  longBreak: 15 * 60
};

var MODE_META = {
  focus:     { label: "Focus",      color: "#ff6b6b" },
  break:     { label: "Break",      color: "#4ecdc4" },
  longBreak: { label: "Long break", color: "#6c8cff" }
};

var LONG_BREAK_EVERY = 4;

/**
 * Remaining whole seconds until an absolute target timestamp.
 * Clamped to >= 0. This is computed from the wall clock on every tick,
 * so it stays correct even if the tab was backgrounded / throttled.
 */
function remainingSeconds(targetTs, now) {
  return Math.max(0, Math.ceil((targetTs - now) / 1000));
}

/** Format a number of seconds as MM:SS. */
function formatTime(totalSeconds) {
  var s = Math.max(0, Math.floor(totalSeconds));
  var m = Math.floor(s / 60);
  var sec = s % 60;
  return String(m).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
}

/**
 * Given the mode that just finished and how many focus blocks have been
 * completed (including the one that may have just finished), decide the
 * next mode. Pure: same inputs -> same output.
 *
 * After a focus block: long break every 4th focus, otherwise short break.
 * After any break: back to focus.
 */
function nextMode(finishedMode, completedFocus) {
  if (finishedMode === "focus") {
    return (completedFocus % LONG_BREAK_EVERY === 0) ? "longBreak" : "break";
  }
  return "focus";
}

/* ------------------------------------------------------------------ *
 *  Application state (the only mutable bits)
 * ------------------------------------------------------------------ */

var state = {
  mode: "focus",
  running: false,
  targetTs: 0,                 // absolute ms timestamp the current block ends at
  remaining: DURATIONS.focus,  // last-known remaining seconds (for pause/display)
  completedFocus: 0
};

var tickHandle = null;
var audioCtx = null;

/* ------------------------------------------------------------------ *
 *  DOM
 * ------------------------------------------------------------------ */

var el = {
  body:    document.body,
  mode:    document.getElementById("modeLabel"),
  time:    document.getElementById("time"),
  count:   document.getElementById("count"),
  start:   document.getElementById("startBtn"),
  reset:   document.getElementById("resetBtn"),
  flash:   document.getElementById("flash")
};

var sceneEls = {
  ocean:     document.getElementById("scene-ocean"),
  forest:    document.getElementById("scene-forest"),
  mountains: document.getElementById("scene-mountains")
};
var sceneButtons = Array.prototype.slice.call(document.querySelectorAll(".scene-btn"));

/* ------------------------------------------------------------------ *
 *  Rendering
 * ------------------------------------------------------------------ */

function render() {
  var meta = MODE_META[state.mode];
  var timeStr = formatTime(state.remaining);

  el.time.textContent = timeStr;
  el.mode.textContent = meta.label;
  el.count.textContent = state.completedFocus;
  el.start.textContent = state.running ? "Pause" : "Start";

  el.body.setAttribute("data-mode", state.mode);
  el.body.style.setProperty("--mode-color", meta.color);

  document.title = timeStr + " · " + meta.label;
}

/* ------------------------------------------------------------------ *
 *  Scene switching
 * ------------------------------------------------------------------ */

function setScene(name) {
  if (!sceneEls[name]) return;
  for (var key in sceneEls) {
    sceneEls[key].classList.toggle("active", key === name);
  }
  sceneButtons.forEach(function (b) {
    b.setAttribute("aria-pressed", b.getAttribute("data-scene") === name ? "true" : "false");
  });
}

/* ------------------------------------------------------------------ *
 *  Feedback: beep (Web Audio) with screen-flash fallback
 * ------------------------------------------------------------------ */

function beep() {
  try {
    if (!audioCtx) {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) throw new Error("no Web Audio");
      audioCtx = new Ctx();
    }
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
    if (audioCtx.state !== "running") {
      throw new Error("audio not running");
    }

    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    var t = audioCtx.currentTime;

    osc.type = "sine";
    osc.frequency.setValueAtTime(880, t);
    osc.frequency.setValueAtTime(660, t + 0.12);

    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.36);
  } catch (e) {
    flashScreen();
  }
}

function flashScreen() {
  el.flash.classList.remove("active");
  void el.flash.offsetWidth; // force reflow so the animation can restart
  el.flash.classList.add("active");
}

/* ------------------------------------------------------------------ *
 *  Timing loop
 * ------------------------------------------------------------------ */

function tick() {
  if (!state.running) return;

  var now = Date.now();
  state.remaining = remainingSeconds(state.targetTs, now);

  if (state.remaining <= 0) {
    handleBlockComplete();
    return;
  }
  render();
}

function startTicking() {
  if (tickHandle !== null) return;
  tickHandle = setInterval(tick, 250);
}

function stopTicking() {
  if (tickHandle !== null) {
    clearInterval(tickHandle);
    tickHandle = null;
  }
}

/**
 * A block reached zero: count focus sessions, signal, then advance.
 */
function handleBlockComplete() {
  var finishedMode = state.mode;

  if (finishedMode === "focus") {
    state.completedFocus += 1;
  }

  beep();

  var upcoming = nextMode(finishedMode, state.completedFocus);
  state.mode = upcoming;
  state.remaining = DURATIONS[upcoming];
  // Next block auto-starts and keeps running, anchored to the wall clock.
  state.targetTs = Date.now() + DURATIONS[upcoming] * 1000;

  render();
}

/* ------------------------------------------------------------------ *
 *  Controls
 * ------------------------------------------------------------------ */

function start() {
  if (state.running) return;
  state.running = true;
  state.targetTs = Date.now() + state.remaining * 1000;
  startTicking();
  primeAudio(); // try to unlock audio inside the user gesture
  render();
}

function pause() {
  if (!state.running) return;
  state.remaining = remainingSeconds(state.targetTs, Date.now());
  state.running = false;
  stopTicking();
  render();
}

function toggle() {
  state.running ? pause() : start();
}

function reset() {
  state.running = false;
  stopTicking();
  state.mode = "focus";
  state.remaining = DURATIONS.focus;
  state.targetTs = 0;
  state.completedFocus = 0;
  render();
}

function primeAudio() {
  try {
    if (!audioCtx) {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtx = new Ctx();
    }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  } catch (e) { /* ignore — beep() will fall back to a flash */ }
}

/* ------------------------------------------------------------------ *
 *  Wiring
 * ------------------------------------------------------------------ */

el.start.addEventListener("click", toggle);
el.reset.addEventListener("click", reset);

sceneButtons.forEach(function (b) {
  b.addEventListener("click", function () { setScene(b.getAttribute("data-scene")); });
});

var SCENE_KEYS = { "1": "ocean", "2": "forest", "3": "mountains" };

document.addEventListener("keydown", function (e) {
  if (e.metaKey || e.ctrlKey || e.altKey) return;

  if (e.code === "Space" || e.key === " ") {
    e.preventDefault();
    toggle();
  } else if (e.key === "r" || e.key === "R") {
    reset();
  } else if (SCENE_KEYS[e.key]) {
    setScene(SCENE_KEYS[e.key]);
  }
});

// Re-sync immediately when the tab becomes visible again.
document.addEventListener("visibilitychange", function () {
  if (!document.hidden) tick();
});

render();
</script>
</body>
</html>
